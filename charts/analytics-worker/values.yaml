# --- Image ---
image:
  repository: "064160141787.dkr.ecr.ca-central-1.amazonaws.com/analytics-worker"
  tag: "latest"
  pullPolicy: IfNotPresent

# --- Replicas ---
replicaCount: 2

# --- Service ---
service:
  type: ClusterIP
  port: 80
  targetPort: 8081

# -- Resources ---
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# --- HPA ---
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# --- PDB ---
pdb:
  enabled: true
  minAvailable: 1

# --- Health Probes ---
probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

# --- Config ---
config:
  AMQP_PREFETCH: "10"
  MONGO_DB: analytics
  HEALTH_PORT: 8081
  SHUTDOWN_TIMEOUT: "15s"

# --- Secrets (reference only) ---
secrets:
  name: analytics-worker-secrets-prod
  mongoURIKey: MONGO_URI
  amqpURLKey: AMQP_URL

# --- External Secrets ---
externalSecret:
  enabled: true
  storeName: aws-secrets-manager
  secretsManagerKey: linkr/prod/analytics-worker

# --- Service Account ---
serviceAccount:
  create: true
  name: "" # Auto-generate from release name if it's empty
