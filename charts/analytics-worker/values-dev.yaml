# --- Dev values that overwrite default (prod)
# --- Image ---
image:
  repository: "064160141787.dkr.ecr.ca-central-1.amazonaws.com/analytics-worker-dev"
  pullPolicy: Always

# --- Replicas ---
replicaCount: 1

# -- Resources ---
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# --- HPA ---
hpa:
  enabled: false
  minReplicas: 1

# --- PDB ---
pdb:
  enabled: false

# --- Config ---
config:
  AMQP_PREFETCH: "5"

# --- Secrets (reference only) ---
secrets:
  name: analytics-worker-secrets-dev

# --- External Secrets ---
externalSecret:
  secretsManagerKey: linkr/dev/analytics-worker
