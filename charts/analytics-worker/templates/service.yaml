apiVersion: v1
kind: Service
metadata:
  name: {{ include "analytics-worker.fullname" . }}
  labels:
    {{- include "analytics-worker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: health
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "analytics-worker.selectorLabels" . | nindent 4 }}
