# --- Dev values that overwrite default (prod)
# --- Image ---
image:
  pullPolicy: Always

# --- Replicas ---
replicaCount: 1

# -- Resources ---
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# --- HPA ---
hpa:
  enabled: false
  minReplicas: 1

# --- PDB ---
pdb:
  enabled: false

# --- Config ---
config:
  ENV: dev
  CACHE_TTL: "5m"

# --- Secrets (reference only) ---
secrets:
  name: shortener-api-secrets-dev

# --- External Secrets ---
externalSecret:
  secretsManagerKey: linkr/dev/shortener-api
